name: Update GitHub Activity


on:

  schedule:

    - cron: "0 */6 * * *"


  workflow_dispatch:


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

      - uses: jamesgeorge007/github-activity-readme@master

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:

          COMMIT_MSG: "⚡ Update recent activity"

          MAX_LINES: 10
